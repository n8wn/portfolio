    <link rel="stylesheet" href="../style.css" />
    <div>
      <link href="./footer.css" rel="stylesheet" />
      <div class="footer-container1">
        <footer class="footer-wrapper">
          <div class="footer-background-layer">
            <img
              src="https://images.pexels.com/photos/943096/pexels-photo-943096.jpeg?auto=compress&amp;cs=tinysrgb&amp;w=200"
              alt="Programming workspace background"
              loading="lazy"
              class="footer-background-image"
            />
            <div class="footer-scrim-overlay"></div>
          </div>
          <div class="footer-container">
            <div class="footer-bottom-bar">
              <div class="footer-legal-group">
                <p class="footer-copyright section-content">
                  &amp;copy; 2025 CodeVista. Developed with passion &amp;
                  precision.
                </p>
                <div class="footer-legal-links">
                  <a href="#">
                    <div class="footer-legal-link">
                      <span>Privacy Policy</span>
                    </div>
                  </a>
                  <a href="#">
                    <div class="footer-legal-link">
                      <span>Terms of Service</span>
                    </div>
                  </a>
                </div>
              </div>
              <div class="footer-tech-stack">
                <span class="footer-tech-label">Built with:</span>
                <div class="footer-tech-icons">
                  <span class="footer-tech-tag">HTML</span>
                  <span class="footer-tech-tag">CSS</span>
                  <span class="footer-tech-tag">JavaSCRIPT</span>
                </div>
              </div>
            </div>
          </div>
        </footer>
        <div class="footer-container2">
          <div class="footer-container3">
            <style>
                      @keyframes footerPulse {0% {transform: scale(1);
              opacity: 1;}
              50% {transform: scale(1.2);
              opacity: 0.6;}
              100% {transform: scale(1);
              opacity: 1;}}
            </style>
          </div>
        </div>
        <div class="footer-container4">
          <div class="footer-container5">
            <script defer="" data-name="footer-newsletter-handler">
              document.addEventListener('DOMContentLoaded', function() {
                (function(){
                  const footerForm = document.querySelector(".footer-newsletter-form")
                  const footerEmailInput = document.querySelector(".footer-email-input")
                  const footerInputWrapper = document.querySelector(".footer-input-wrapper")

                  if (footerForm) {
                    footerForm.addEventListener("submit", (e) => {
                      const email = footerEmailInput.value

                      if (email) {
                        footerInputWrapper.style.borderColor = "#2ecc71"
                        footerEmailInput.disabled = true
                        const submitBtn = footerForm.querySelector(".footer-submit-btn")
                        submitBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'
                        submitBtn.style.backgroundColor = "#2ecc71"

                        setTimeout(() => {
                          footerEmailInput.value = ""
                          footerEmailInput.placeholder = "Thanks for subscribing!"
                          footerEmailInput.disabled = false
                          submitBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14m-7-7l7 7l-7 7"/></svg>'
                          submitBtn.style.backgroundColor = ""
                          footerInputWrapper.style.borderColor = ""
                        }, 3000)
                      }
                    })

                    footerEmailInput.addEventListener("invalid", (e) => {
                      footerInputWrapper.style.borderColor = "#e74c3c"
                    })

                    footerEmailInput.addEventListener("input", () => {
                      footerInputWrapper.style.borderColor = ""
                    })
                  }
                })()
              });
            </script>
          </div>
        </div>
      </div>
    </div>
  </body>
